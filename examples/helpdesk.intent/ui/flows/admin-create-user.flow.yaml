id: admin-create-user
description: "Duplicate username -> inline error (409 path); fresh username -> row appears, DB gains one user"
viewport: desktop
fixture: seeded
auth: { principal: admin }
steps:
  - goto: /admin/users
  - expect: { anchor: admin-users.header.accent-bar, visible: true }   # admin context is unmistakable
  - click: admin-users.main.create-btn
  - fill:  { anchor: admin-users.main.create-form.username-input, value: "$fixture.user1.username" }
  - fill:  { anchor: admin-users.main.create-form.password-input, value: "temp-pass-123" }
  - select: { anchor: admin-users.main.create-form.role-select, value: user }
  - click: admin-users.main.create-form.submit-btn
  - expect: { anchor: admin-users.main.create-form.error, visible: true, copy: error.duplicate-username }
  - fill:  { anchor: admin-users.main.create-form.username-input, value: "flowtest-user" }
  - click: admin-users.main.create-form.submit-btn
  - expect: { anchor: admin-users.main.user-table, contains_text: "flowtest-user" }
  - expect_db:
      delta: { query: "SELECT COUNT(*) FROM users", equals: 1 }
strictness: { no_unexpected_dialogs: true, max_extra_steps: 0 }
